<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crea una nuova offerta di pasto su ApprofittOffro.">
    <title>Offri un Pasto — ApprofittOffro</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=16">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#FF7043">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/static/sw.js');
        });
      }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">
            <div class="logo-icon">🍽️</div>
            <span>ApprofittOffro</span>
        </a>
        <div class="nav-links">
            <a href="/dashboard" class="btn btn-outline btn-sm">Home</a>
            <a href="/profile" class="btn btn-outline btn-sm">Profilo</a>
            <a href="/logout" class="btn btn-ghost btn-sm" style="color:var(--text-muted)">Esci</a>
        </div>
    </nav>

    <div class="container main-content" style="max-width: 650px;">
        <div class="glass-card" style="text-align: center; padding: 40px;">
            <h2 id="page-title" style="margin-bottom: 8px;">Offri un Pasto 🎉</h2>
            <p style="color: var(--text-muted); margin-bottom: 32px;">Condividi la tua tavola con la community.</p>

            <div id="offer-errors"></div>

            <form id="offer-form">
                <!-- Tipo Pasto -->
                <div class="form-group">
                    <label for="tipo_pasto">Tipo di Pasto</label>
                    <select id="tipo_pasto" name="tipo_pasto" class="form-control" required>
                        <option value="">Seleziona il tipo</option>
                        {% for code, label in tipi_pasto %}
                        <option value="{{ code }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Nome Locale -->
                <div class="form-group">
                    <label for="nome_locale">Nome del Locale</label>
                    <input type="text" id="nome_locale" name="nome_locale" class="form-control" placeholder="Es: Bar Roma, Pizzeria Da Luigi..." required>
                </div>

                <!-- Indirizzo -->
                <div class="form-group">
                    <label for="indirizzo">Indirizzo</label>
                    <input type="text" id="indirizzo" name="indirizzo" class="form-control" placeholder="Via Roma 1, Milano" required>
                </div>

                <!-- Mappa per posizione locale -->
                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 8px;">
                        <label style="margin:0;">📍 Dove si trova il locale?</label>
                        <button type="button" id="toggle-venues-btn" onclick="toggleVenues()" class="btn btn-outline" style="padding: 4px 12px; font-size: 0.8rem; border-radius: 100px;">
                            <span id="venue-icon">👁️</span> Locali vicini
                        </button>
                    </div>
                    <div style="border-radius: var(--radius-md); overflow: hidden; border: 2px solid var(--border); height: 280px; margin-bottom: 12px; position: relative;">
                        <div id="offer-map" style="height: 100%;"></div>
                    </div>
                    <input type="hidden" id="offer-lat" name="latitudine">
                    <input type="hidden" id="offer-lon" name="longitudine">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <p class="text-muted" id="offer-location-label" style="font-size: 0.85rem; font-weight: 700; color: var(--primary); margin:0;">
                            📍 Trascina per posizionare il pin
                        </p>
                    </div>
                </div>

                <!-- Numero Posti -->
                <div class="form-group">
                    <label for="posti_totali">Numero di persone a cui vuoi offrire</label>
                    <input type="number" id="posti_totali" name="posti_totali" class="form-control" min="1" max="50" placeholder="Es: 3" required>
                </div>

                <!-- Data e Ora -->
                <div class="form-group">
                    <label for="data_ora">Data e ora</label>
                    <input type="datetime-local" id="data_ora" name="data_ora" class="form-control" required>
                </div>

                <!-- Descrizione -->
                <div class="form-group">
                    <label for="descrizione">Descrizione</label>
                    <textarea id="descrizione" name="descrizione" class="form-control" placeholder="La descrizione è molto importante per far conoscere agli altri utenti le proprie abitudini e un po' del proprio carattere." rows="3" minlength="30" required></textarea>
                </div>

                <div class="form-group">
                    <label>Foto del Locale <span style="font-weight:normal; font-size:0.8rem; color:var(--text-muted);">(Opzionale)</span></label>
                    
                    <input type="file" id="trigger_camera" accept="image/*" capture="environment" style="display:none;" onchange="handleFotoSelect(this)">
                    <input type="file" id="trigger_galleria" accept="image/*" style="display:none;" onchange="handleFotoSelect(this)">
                    
                    <div style="display:flex; gap:12px; margin-top:12px;">
                        <button type="button" onclick="document.getElementById('trigger_camera').click()" class="btn btn-outline" style="flex:1; font-weight: 700;">
                            📷 Scatta
                        </button>
                        <button type="button" onclick="document.getElementById('trigger_galleria').click()" class="btn btn-outline" style="flex:1; font-weight: 700;">
                            🖼️ Galleria
                        </button>
                    </div>
                    
                    <div id="foto-preview" style="margin-top:20px; display:none; text-align:center;">
                        <img id="foto-preview-img" style="max-width:100%; height: 200px; border-radius:var(--radius-md); object-fit:cover; box-shadow: var(--shadow-md);">
                        <div style="font-size:0.85rem; color:var(--primary); margin-top:8px; font-weight: 800;" id="foto-preview-name"></div>
                    </div>
                </div>

                <button type="submit" class="btn btn-accent btn-block btn-lg" id="offer-btn" style="margin-top: 40px;">
                    PUBBLICA OFFERTA
                </button>
                <a href="/dashboard" class="btn btn-ghost btn-block mt-2">Annulla</a>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>
    <div id="offer-error-modal" class="offer-error-modal" aria-hidden="true">
        <div class="offer-error-backdrop" onclick="closeOfferErrorModal()"></div>
        <div class="offer-error-dialog" role="dialog" aria-modal="true" aria-labelledby="offer-error-title">
            <button type="button" class="offer-error-close" onclick="closeOfferErrorModal()" aria-label="Chiudi avviso">×</button>
            <div class="offer-error-badge">Attenzione</div>
            <h3 id="offer-error-title">Offerta non pubblicata</h3>
            <div id="offer-error-message" class="offer-error-message"></div>
            <button type="button" class="btn btn-accent btn-block" onclick="closeOfferErrorModal()">Ho capito</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        function showOfferErrorModal(messages) {
            const modal = document.getElementById('offer-error-modal');
            const messageBox = document.getElementById('offer-error-message');
            const normalizedMessages = Array.isArray(messages) ? messages : [messages];
            messageBox.innerHTML = normalizedMessages.map(msg => `<p>${msg}</p>`).join('');
            modal.classList.add('is-visible');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeOfferErrorModal() {
            const modal = document.getElementById('offer-error-modal');
            modal.classList.remove('is-visible');
            modal.setAttribute('aria-hidden', 'true');
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeOfferErrorModal();
            }
        });

        // Auto-fill in caso di Modifica (Edit Mode)
        {% if offer %}
        const offerEditId = {{ offer.id }};
        let offerEditLat = {{ offer.latitudine }};
        let offerEditLon = {{ offer.longitudine }};
        document.addEventListener("DOMContentLoaded", () => {
            const h2 = document.querySelector('h2');
            if(h2) h2.innerText = "Modifica l'Offerta";
            document.getElementById('tipo_pasto').value = "{{ offer.tipo_pasto }}";
            document.getElementById('nome_locale').value = {{ offer.nome_locale|tojson }};
            document.getElementById('indirizzo').value = {{ offer.indirizzo|tojson }};
            document.getElementById('posti_totali').value = "{{ offer.posti_totali }}";
            document.getElementById('data_ora').value = "{{ offer.data_ora.strftime('%Y-%m-%dT%H:%M') }}";
            document.getElementById('descrizione').value = {{ offer.descrizione|tojson if offer.descrizione else '""' }};
            const label = document.querySelector('label');
            if (label && label.innerText.includes('Foto del Locale')) {
                label.innerHTML = 'Aggiorna foto del Locale <span style="font-weight:normal; font-size:0.8rem; color:var(--text-muted);">(Opzionale)</span>';
            }
            
            document.getElementById('offer-btn').innerHTML = '💾 Salva Modifiche';
        });
        {% endif %}

        // ---- Pre-compilazione da "Offri qui!" (URL params) ----
        (function prefillFromVenue() {
            const params = new URLSearchParams(window.location.search);
            const nome = params.get('nome');
            const indir = params.get('indirizzo');
            const lat  = params.get('lat');
            const lon  = params.get('lon');
            
            // Salva subito le coordinate per initOfferMap()
            if (lat && lon) {
                window._prefillLat = parseFloat(lat);
                window._prefillLon = parseFloat(lon);
            }
            
            if (nome) {
                const nomeField = document.getElementById('nome_locale');
                if (nomeField && !nomeField.value) nomeField.value = nome;
            }
            if (indir) {
                const indirField = document.getElementById('indirizzo');
                if (indirField && !indirField.value) indirField.value = indir;
            }
        })();

        // ---- Mappa offerta ----
        let offerMap, offerMarker;

        // ---- Locali Vicini (Overpass API) ----
        let venuesActive = false;
        let venueMarkers = [];

        function toggleVenues() {
            venuesActive = !venuesActive;
            const btn = document.getElementById('toggle-venues-btn');
            const icon = document.getElementById('venue-icon');
            if (venuesActive) {
                btn.style.background = 'var(--primary)';
                btn.style.color = 'white';
                icon.innerText = '✅';
                loadVenues();
            } else {
                btn.style.background = '';
                btn.style.color = '';
                icon.innerText = '👁️';
                clearVenueMarkers();
            }
        }

        function clearVenueMarkers() {
            venueMarkers.forEach(m => offerMap.removeLayer(m));
            venueMarkers = [];
        }

        function getVenueStyle(tags) {
            let color = '#999';
            let emoji = '📍';
            if (tags.amenity === 'pizza' || tags.cuisine === 'pizza') { color = '#E53935'; emoji = '🍕'; }
            else if (tags.amenity === 'restaurant') { color = '#FB8C00'; emoji = '🍽️'; }
            else if (tags.amenity === 'cafe') { color = '#6D4C41'; emoji = '☕'; }
            else if (tags.amenity === 'bar' || tags.amenity === 'pub') { color = '#8E24AA'; emoji = '🍺'; }
            else if (tags.amenity === 'fast_food') { color = '#FDD835'; emoji = '🍔'; }
            else if (tags.amenity === 'ice_cream') { color = '#F48FB1'; emoji = '🍦'; }
            else if (tags.amenity === 'bakery') { color = '#F57C00'; emoji = '🥐'; }
            return { color, emoji };
        }

        window.selectVenueFromMap = function(name, address, lat, lon) {
            const nomeField = document.getElementById('nome_locale');
            if(nomeField) nomeField.value = decodeURIComponent(name);
            
            // Invece di usare l'indirizzo delle tag OSM (spesso incompleto e senza città), 
            // forziamo un geocode dal nostro server per avere un indirizzo di qualità.
            updateOfferLocation(lat, lon);
            
            // Aggiorna marker offerta e centra
            if(offerMarker) offerMarker.setLatLng([lat, lon]);
            if(offerMap) offerMap.setView([lat, lon], 17);
            
            // Imposta coordinate
            document.getElementById('offer-lat').value = lat;
            document.getElementById('offer-lon').value = lon;
            
            document.getElementById('offer-location-label').innerHTML = `📍 <b style="color:var(--success);">Indirizzo locale importato</b>`;
            
            // Chiudi il popup
            if(offerMap) offerMap.closePopup();
        };

        async function loadVenues() {
            if (!venuesActive || !offerMap) return;

            if (offerMap.getZoom() < 12) return;

            const bounds = offerMap.getBounds();
            const s = bounds.getSouth();
            const w = bounds.getWest();
            const n = bounds.getNorth();
            const e = bounds.getEast();

            const query = `
                [out:json][timeout:15];
                (
                  nwr["amenity"~"^(restaurant|cafe|bar|pub|fast_food|ice_cream|bakery)$"](${s},${w},${n},${e});
                );
                out center;
            `;

            try {
                const res = await fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: query
                });
                const data = await res.json();
                
                clearVenueMarkers();

                data.elements.forEach(el => {
                    const lat = el.lat || (el.center && el.center.lat);
                    const lon = el.lon || (el.center && el.center.lon);
                    
                    if (!lat || !lon) return;
                    const tags = el.tags || {};
                    const name = tags.name || tags.amenity || 'Locale';
                    const style = getVenueStyle(tags);
                    
                    let fullAddress = '';
                    const street = tags['addr:street'] || tags['addr:place'] || '';
                    if (street) {
                        fullAddress = street;
                        if (tags['addr:housenumber']) fullAddress += ' ' + tags['addr:housenumber'];
                        const city = tags['addr:city'] || tags['addr:town'] || tags['addr:village'] || '';
                        if (city) fullAddress += ', ' + city;
                    } else {
                        // Fallback se non c'è la strada
                        const city = tags['addr:city'] || tags['addr:town'] || tags['addr:village'] || '';
                        if (city) fullAddress = city;
                        else fullAddress = name;
                    }

                    const icon = L.divIcon({
                        className: '',
                        html: `<div style="
                            background: white;
                            border: 3px solid ${style.color};
                            width: 32px; height: 32px;
                            border-radius: 50%;
                            display: flex; align-items: center; justify-content: center;
                            font-size: 15px;
                            box-shadow: 0 2px 5px rgba(0,0,0,0.25);
                            cursor: pointer;
                        ">${style.emoji}</div>`,
                        iconSize: [32, 32],
                        iconAnchor: [16, 16],
                        popupAnchor: [0, -18]
                    });

                    const btnHtml = `<button type="button" onclick="selectVenueFromMap(
                        '${encodeURIComponent(name).replace(/'/g, "\\'")}', 
                        '${encodeURIComponent(fullAddress).replace(/'/g, "\\'")}', 
                        ${el.lat}, ${el.lon})" 
                        style="
                            display: block; width: 100%; text-align: center; border: none;
                            background: #FF7043; color: white; cursor: pointer;
                            padding: 6px 0; border-radius: 20px;
                            font-weight: 800; font-size: 0.8rem;
                            margin-top: 8px;
                        ">🎉 Seleziona Qui!</button>`;

                    const marker = L.marker([el.lat, el.lon], { icon, zIndexOffset: -100 })
                        .addTo(offerMap)
                        .bindPopup(`
                            <div style="font-family: 'Outfit', sans-serif; min-width: 150px; text-align:center;">
                                <div style="font-size: 1.3rem; margin-bottom: 2px;">${style.emoji}</div>
                                <b style="font-size: 0.9rem;">${name}</b>
                                <div style="font-size: 0.75rem; color: #999; margin: 2px 0;">
                                    ${fullAddress ? fullAddress : (tags.amenity ? tags.amenity.replace('_', ' ') : '')}
                                </div>
                                ${btnHtml}
                            </div>
                        `);
                    venueMarkers.push(marker);
                });
            } catch (err) {}
        }

        async function updateOfferLocation(lat, lon) {
            document.getElementById('offer-lat').value = lat;
            document.getElementById('offer-lon').value = lon;
            
            const indirizzoInput = document.getElementById('indirizzo');

            document.getElementById('offer-location-label').innerHTML = `📍 Ricerca in corso...`;

            try {
                const res = await fetch(`/api/geocode?lat=${lat}&lon=${lon}`);
                const data = await res.json();
                
                indirizzoInput.value = data.address;
                document.getElementById('offer-location-label').innerHTML = `📍 <b style="color:var(--success);">Posizione selezionata</b>`;
            } catch {
                indirizzoInput.value = "Posizione Geografica";
                document.getElementById('offer-location-label').innerHTML = `📍 <b style="color:var(--success);">Posizione Mappa</b>`;
            }
        }
        // Gestisce la selezione foto (sia da camera che da galleria)
        function handleFotoSelect(trigger) {
            if (!trigger.files || !trigger.files[0]) return;
            const file = trigger.files[0];

            // Mostra anteprima
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('foto-preview-img').src = e.target.result;
                document.getElementById('foto-preview-name').textContent = '✅ ' + file.name;
                document.getElementById('foto-preview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        async function initOfferMap() {
            let startLoc = [41.9028, 12.4964];
            let startZoom = 16;
            
            let isPrefilled = false;
            
            if (typeof offerEditLat !== 'undefined' && offerEditLat) {
                // Modalità modifica: usa le coordinate dell'offerta esistente
                startLoc = [offerEditLat, offerEditLon];
            } else if (window._prefillLat && window._prefillLon) {
                // Da "Offri qui!": usa le coordinate del locale cliccato
                startLoc = [window._prefillLat, window._prefillLon];
                isPrefilled = true;
            } else {
                // Nuova offerta: prova prima il GPS live del dispositivo
                const gpsPosition = await new Promise((resolve) => {
                    if (!navigator.geolocation) { resolve(null); return; }
                    navigator.geolocation.getCurrentPosition(
                        (pos) => resolve([pos.coords.latitude, pos.coords.longitude]),
                        () => resolve(null),
                        { timeout: 6000, maximumAge: 60000, enableHighAccuracy: true }
                    );
                });

                if (gpsPosition) {
                    startLoc = gpsPosition;
                    document.getElementById('offer-location-label').innerHTML = `📍 <b style="color:var(--success);">GPS attivo — trascina per affinare la posizione</b>`;
                } else {
                    // Fallback: coordinate salvate nel profilo utente
                    try {
                        const userRes = await fetch('/api/user/me');
                        const userData = await userRes.json();
                        if (userData.success && userData.user.lat) {
                            startLoc = [userData.user.lat, userData.user.lon];
                        }
                    } catch (err) { }
                }
            }

            offerMap = L.map('offer-map').setView(startLoc, startZoom);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 19,
            }).addTo(offerMap);

            offerMarker = L.marker(startLoc).addTo(offerMap);
            updateOfferLocation(startLoc[0], startLoc[1]);

            offerMap.on('move', function() {
                offerMarker.setLatLng(offerMap.getCenter());
            });

            let otId;
            offerMap.on('moveend', function() {
                clearTimeout(otId);
                otId = setTimeout(() => {
                    const center = offerMap.getCenter();
                    updateOfferLocation(center.lat, center.lng);
                    if (venuesActive) loadVenues();
                }, 600);
            });
        }

        // Data minima = ora corrente
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('data_ora').min = now.toISOString().slice(0, 16);

        // ---- Invio offerta ----
        document.getElementById('offer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('offer-btn');
            const errorsDiv = document.getElementById('offer-errors');
            errorsDiv.innerHTML = '';

            btn.disabled = true;
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> Salvataggio...';

            const formData = new FormData();
            formData.append('tipo_pasto', document.getElementById('tipo_pasto').value);
            formData.append('nome_locale', document.getElementById('nome_locale').value);
            formData.append('indirizzo', document.getElementById('indirizzo').value);
            formData.append('latitudine', document.getElementById('offer-lat').value);
            formData.append('longitudine', document.getElementById('offer-lon').value);
            formData.append('posti_totali', document.getElementById('posti_totali').value);
            formData.append('data_ora', document.getElementById('data_ora').value);
            formData.append('descrizione', document.getElementById('descrizione').value);
            
            // Recupera la foto (da fotocamera o galleria)
            let fotoFile = null;
            if (document.getElementById('trigger_camera').files.length > 0) {
                fotoFile = document.getElementById('trigger_camera').files[0];
            } else if (document.getElementById('trigger_galleria').files.length > 0) {
                fotoFile = document.getElementById('trigger_galleria').files[0];
            }
            
            if (fotoFile) {
                formData.append('foto_locale', fotoFile);
            }

            try {
                const isEdit = typeof offerEditId !== 'undefined' && offerEditId;
                const url = isEdit ? `/api/offers/${offerEditId}` : '/api/offers';
                const method = isEdit ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    body: formData
                });
                
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    const errors = data.errors || [data.error || 'Non è stato possibile pubblicare l\'offerta.'];
                    errorsDiv.innerHTML = `<div class="alert alert-error">${errors.join('<br>')}</div>`;
                    showOfferErrorModal(errors);
                    btn.disabled = false;
                    btn.innerHTML = originalBtnHtml;
                }
            } catch (err) {
                const connectionError = 'Errore di connessione al server.';
                errorsDiv.innerHTML = `<div class="alert alert-error">${connectionError}</div>`;
                showOfferErrorModal(connectionError);
                btn.disabled = false;
                btn.innerHTML = originalBtnHtml;
            }
        });

        // Init
        initOfferMap();
    </script>
</body>
</html>
