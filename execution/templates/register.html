<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrati - ApprofittOffro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=5">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body style="background: var(--bg-surface);">
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <div class="logo-icon">🍽️</div>
            ApprofittOffro
        </a>
    </nav>

    <main class="main-content container auth-container">
        <div class="glass-card" style="width: 100%; max-width: 800px; padding: 48px;">
            <center>
                <h2>Crea il tuo Account</h2>
                <p class="text-muted mb-3">Unisciti alla nostra community del cibo condiviso.</p>
            </center>

            <div id="register-alerts"></div>

            <form id="registerForm" enctype="multipart/form-data">
                <div class="register-layout">
                    <!-- Colonna 1: Dati base -->
                    <div>
                        <div class="form-group">
                            <label>Foto Profilo (Deve mostrare il viso)</label>
                            <div class="photo-upload" id="photo-upload-btn">
                                <span class="placeholder" id="photo-placeholder">Clicca o trascina<br>la tua foto</span>
                                <img id="photo-preview" class="hidden" alt="Anteprima">
                                <input type="file" id="foto" name="foto" accept="image/*" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="nome">Nome o Nickname</label>
                            <input type="text" id="nome" name="nome" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email address</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="password">Crea Password</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="conferma_password">Conferma Password</label>
                            <input type="password" id="conferma_password" name="conferma_password" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="fascia_eta">Fascia d'età</label>
                            <select id="fascia_eta" name="fascia_eta" class="form-control" required>
                                <option value="" disabled selected>Seleziona...</option>
                                <option value="18-25">18 - 25</option>
                                <option value="26-35">26 - 35</option>
                                <option value="36-45">36 - 45</option>
                                <option value="46-55">46 - 55</option>
                                <option value="56-65">56 - 65</option>
                                <option value="65+">65+</option>
                            </select>
                        </div>
                    </div>

                    <!-- Colonna 2: Località -->
                    <div>
                        <div class="form-group">
                            <label>La tua Zona</label>
                            <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 8px;">Clicca sulla mappa per impostare la tua zona. Cercheremo offerte vicino a qui.</p>
                            <div class="map-container" style="height: 300px; min-height: 300px;">
                                <div id="register-map"></div>
                            </div>
                            <!-- Campi nascosti valorizzati dalla mappa per invio corretto a Flask -->
                            <input type="hidden" id="lat" name="latitudine">
                            <input type="hidden" id="lon" name="longitudine">
                            <input type="hidden" id="citta" name="citta">
                            
                            <div class="mt-2 text-center">
                                <span id="location-name" class="text-muted" style="font-size: 0.9rem; font-weight: 500;">Nessuna zona selezionata (clicca sulla mappa)</span>
                            </div>
                        </div>
                    </div>
                </div>

                <hr style="border: none; border-top: 1px solid var(--border); margin: 32px 0;">
                
                <button type="submit" class="btn btn-primary btn-block btn-lg">Registra Account</button>
                <p class="text-center mt-2">Hai già un account? <a href="/#login-section">Accedi</a></p>
            </form>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Mappa Logic (Pin Fisso Centrale Stile Uber)
        let map;
        let marker;

        async function updateLocation(lat, lon) {
            document.getElementById('lat').value = lat;
            document.getElementById('lon').value = lon;
            document.getElementById('location-name').innerHTML = `📍 Ricerca indirizzo in corso...`;

            try {
                const res = await fetch(`/api/geocode?lat=${lat}&lon=${lon}`);
                const data = await res.json();
                
                document.getElementById('citta').value = data.address;
                document.getElementById('location-name').innerHTML = `📍 <b style="color:var(--success);">${data.address}</b>`;
            } catch (err) {
                document.getElementById('citta').value = "Posizione Geografica";
                document.getElementById('location-name').innerHTML = `📍 <b style="color:var(--success);">Posizione Mappa</b>`;
            }
        }

        function initMap() {
            // Partiamo da un punto visibile con zoom stradale molto vicino
            const defaultPos = [41.9028, 12.4964];
            map = L.map('register-map').setView(defaultPos, 16);
            
            // Nuovo layer OpenStreetMap ad altissimo dettaglio (strade e civici scritti in grande)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            // Inizializza marker e data
            marker = L.marker(defaultPos).addTo(map);
            updateLocation(defaultPos[0], defaultPos[1]);

            // Se il GPS funziona (in HTTPS o localhost vero) si sposta da solo
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    map.setView([lat, lon], 16);
                    marker.setLatLng([lat, lon]);
                    updateLocation(lat, lon);
                }, () => {}, { timeout: 5000 });
            }

            // Il marker segue esattamente il centro della mappa durante il trascinamento
            map.on('move', function() {
                marker.setLatLng(map.getCenter());
            });

            // Quando smette di trascinare, carica nome strada con debounce
            let tId;
            map.on('moveend', function() {
                clearTimeout(tId);
                tId = setTimeout(() => {
                    const center = map.getCenter();
                    updateLocation(center.lat, center.lng);
                }, 600);
            });
        }

        window.onload = initMap;

        // Anteprima Foto
        const photoInput = document.getElementById('foto');
        const preview = document.getElementById('photo-preview');
        const placeholder = document.getElementById('photo-placeholder');

        photoInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // Submit Form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            
            const latVal = document.getElementById('lat').value;
            if (!latVal || latVal === "") {
                const alertBox = document.getElementById('register-alerts');
                alertBox.innerHTML = '<div class="alert alert-error">⚠️ Errore: <b>Non hai cliccato sulla mappa!</b> Devi cliccare o toccare un punto sulla mappa per indicare la tua zona di residenza.</div>';
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }
            
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;

            const formData = new FormData(e.target);
            try {
                const res = await fetch('/api/register', { method: 'POST', body: formData });
                const data = await res.json();
                
                const alertBox = document.getElementById('register-alerts');
                alertBox.innerHTML = '';
                
                if (data.success) {
                    alertBox.innerHTML = `<div class="alert alert-success">✅ ${data.message}</div>`;
                    e.target.reset();
                    preview.classList.add('hidden');
                    placeholder.classList.remove('hidden');
                    window.scrollTo(0,0);
                } else {
                    data.errors.forEach(err => {
                        alertBox.innerHTML += `<div class="alert alert-error">⚠️ ${err}</div>`;
                    });
                }
            } catch (err) {
                document.getElementById('register-alerts').innerHTML = `<div class="alert alert-error">⚠️ Errore di connessione.</div>`;
            }
            btn.innerHTML = 'Registra Account';
            btn.disabled = false;
        });
    </script>
</body>
</html>
