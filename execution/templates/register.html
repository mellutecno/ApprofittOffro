<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registrati su ApprofittOffro per offrire o approfittare di pasti nella tua zona.">
    <title>Registrati — ApprofittOffro</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <span class="logo-icon">🍽️</span>
            ApprofittOffro
        </a>
        <ul class="navbar-nav">
            <li><a href="/">← Torna al Login</a></li>
        </ul>
    </nav>

    <!-- Registration Form -->
    <div class="auth-container main-content">
        <div class="glass-card auth-card" style="max-width: 560px;">
            <h2>Crea il tuo Account</h2>
            <p class="subtitle">Unisciti alla community. Ci vogliono solo 2 minuti.</p>

            <div id="register-errors"></div>
            <div id="register-success" class="hidden"></div>

            <form id="register-form" enctype="multipart/form-data">
                <!-- Foto Profilo -->
                <div class="form-group">
                    <label>Foto Profilo (con il tuo volto)</label>
                    <div class="photo-upload" id="photo-upload">
                        <div class="placeholder" id="photo-placeholder">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <span>Carica foto</span>
                        </div>
                        <img id="photo-preview" class="hidden" alt="Anteprima foto">
                        <input type="file" id="foto" name="foto" accept="image/jpeg,image/png,image/webp" required>
                    </div>
                </div>

                <!-- Nome -->
                <div class="form-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" class="form-control" placeholder="Mario Rossi" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="mario@esempio.com" required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password (min. 6 caratteri)</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" minlength="6" required>
                </div>

                <!-- Fascia d'età -->
                <div class="form-group">
                    <label for="fascia_eta">Fascia d'età</label>
                    <select id="fascia_eta" name="fascia_eta" class="form-control" required>
                        <option value="">Seleziona la tua fascia d'età</option>
                        {% for code, label in fasce_eta %}
                        <option value="{{ code }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Mappa per posizione -->
                <div class="form-group">
                    <label>La tua zona (clicca sulla mappa)</label>
                    <div class="map-container map-small">
                        <div id="register-map"></div>
                    </div>
                    <input type="hidden" id="latitudine" name="latitudine">
                    <input type="hidden" id="longitudine" name="longitudine">
                    <input type="hidden" id="citta" name="citta">
                    <p class="text-muted mt-1" id="location-label" style="font-size: 0.85rem;">
                        📍 Clicca sulla mappa per selezionare la tua posizione
                    </p>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">
                    Registrati
                </button>
            </form>

            <p class="text-center mt-3">
                Hai già un account? <a href="/">Accedi</a>
            </p>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        // ---- Mappa di registrazione ----
        const regMap = L.map('register-map').setView([41.9028, 12.4964], 6); // Italia
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap',
            maxZoom: 19,
        }).addTo(regMap);

        let regMarker = null;

        regMap.on('click', async function(e) {
            const { lat, lng } = e.latlng;
            document.getElementById('latitudine').value = lat;
            document.getElementById('longitudine').value = lng;

            if (regMarker) {
                regMarker.setLatLng(e.latlng);
            } else {
                regMarker = L.marker(e.latlng).addTo(regMap);
            }

            // Reverse geocoding per nome città
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
                const data = await res.json();
                const city = data.address.city || data.address.town || data.address.village || data.address.municipality || '';
                document.getElementById('citta').value = city;
                document.getElementById('location-label').textContent = `📍 ${city || 'Posizione selezionata'} (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
            } catch {
                document.getElementById('location-label').textContent = `📍 Posizione selezionata (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
            }
        });

        // Prova geolocalizzazione browser
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                regMap.setView([pos.coords.latitude, pos.coords.longitude], 13);
            });
        }

        // ---- Anteprima foto ----
        document.getElementById('foto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const preview = document.getElementById('photo-preview');
                    preview.src = ev.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('photo-placeholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // ---- Invio form registrazione ----
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const errorsDiv = document.getElementById('register-errors');
            const successDiv = document.getElementById('register-success');
            errorsDiv.innerHTML = '';
            successDiv.classList.add('hidden');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Registrazione in corso...';

            const formData = new FormData(document.getElementById('register-form'));

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    body: formData,
                });

                const data = await res.json();

                if (data.success) {
                    successDiv.innerHTML = `<div class="alert alert-success">✅ ${data.message}</div>`;
                    successDiv.classList.remove('hidden');
                    showToast('Registrazione completata!', 'success');
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    errorsDiv.innerHTML = data.errors.map(e =>
                        `<div class="alert alert-error">⚠️ ${e}</div>`
                    ).join('');
                }
            } catch (err) {
                errorsDiv.innerHTML = '<div class="alert alert-error">⚠️ Errore di connessione.</div>';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Registrati';
            }
        });
    </script>
</body>
</html>
