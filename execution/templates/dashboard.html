<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ApprofittOffro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">
            <div class="logo-icon">🍽️</div>
            ApprofittOffro
        </a>
        <div class="navbar-nav">
            <a href="/new-offer" class="btn btn-primary btn-sm">+ Offri ora</a>
            <a href="/profile">Profilo</a>
            <button onclick="logout()">Esci</button>
        </div>
    </nav>

    <main class="main-content container">
        <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2>Esplora Offerte</h2>
            <div class="filter-bar">
                <button class="filter-chip active" onclick="setFilter('')">Tutte</button>
                <button class="filter-chip" onclick="setFilter('colazione')">Colazione</button>
                <button class="filter-chip" onclick="setFilter('pranzo')">Pranzo</button>
                <button class="filter-chip" onclick="setFilter('cena')">Cena</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Map Container -->
            <div class="map-container">
                <div id="map"></div>
            </div>

            <!-- Offers Panel -->
            <div class="offers-panel" id="offers-panel">
                <!-- Verranno caricate tramite JS -->
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        let map;
        let markers = [];
        let currentFilter = '';
        const defaultLat = {{ current_user.latitudine }};
        const defaultLon = {{ current_user.longitudine }};

        // Custom Leaflet Icons basate sul CSS
        const createCustomIcon = (type) => {
            let color = '#3B82F6';
            if (type === 'colazione') color = '#F59E0B'; // Amber
            if (type === 'pranzo') color = '#10B981'; // Emerald
            if (type === 'cena') color = '#8B5CF6'; // Violet
            
            return L.divIcon({
                className: 'custom-map-marker',
                html: `<div style="background-color: ${color}; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10],
                popupAnchor: [0, -10]
            });
        };

        function initMap() {
            map = L.map('map').setView([defaultLat, defaultLon], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            loadOffers();
        }

        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-chip').forEach(el => {
                if (el.textContent.toLowerCase() === type || (type === '' && el.textContent === 'Tutte')) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
            loadOffers();
        }

        async function loadOffers() {
            try {
                const res = await fetch(`/api/offers?tipo=${currentFilter}`);
                const data = await res.json();
                
                const panel = document.getElementById('offers-panel');
                panel.innerHTML = '';
                
                // Clear markers
                markers.forEach(m => map.removeLayer(m));
                markers = [];

                if (!data.success || data.offers.length === 0) {
                    const filterName = currentFilter ? `per ${currentFilter}` : "";
                    panel.innerHTML = `
                        <div style="text-align: center; padding: 60px 24px; color: var(--text-muted); background: var(--bg-card); border-radius: var(--radius-lg); border: 1px dashed var(--border);">
                            <div style="font-size: 3rem; margin-bottom: 16px;">🍽️</div>
                            <h3>Nessuna offerta</h3>
                            <p>Non ci sono offerte disponibili ${filterName} al momento.</p>
                            <a href="/new-offer" class="btn btn-primary mt-2">+ Offri tu per primo</a>
                        </div>
                    `;
                    return;
                }

                data.offers.forEach(offer => {
                    const isColazione = offer.tipo_pasto === 'colazione';
                    const isPranzo = offer.tipo_pasto === 'pranzo';
                    const iconEmoji = isColazione ? '☕' : (isPranzo ? '🍝' : '🌙');
                    
                    const progress = (offer.posti_disponibili / offer.posti_totali) * 100;
                    let barClass = '';
                    if (progress < 30) barClass = 'critical';
                    else if (progress < 60) barClass = 'low';

                    const card = document.createElement('div');
                    card.className = 'offer-card';
                    card.innerHTML = `
                        <div class="offer-card-header">
                            <img src="/uploads/${offer.autore_foto}" alt="${offer.autore}" class="avatar">
                            <div class="info">
                                <div class="name">${offer.autore}</div>
                                <div class="meta">${offer.autore_fascia_eta} anni</div>
                            </div>
                            <div class="offer-type-badge badge-${offer.tipo_pasto}">
                                ${iconEmoji} ${offer.tipo_pasto.charAt(0).toUpperCase() + offer.tipo_pasto.slice(1)}
                            </div>
                        </div>
                        <div class="offer-card-body">
                            <h4>${offer.nome_locale}</h4>
                            <div class="address">📍 ${offer.indirizzo}</div>
                            <div class="datetime-info">🕒 ${formatDateDisplay(offer.data_ora)}</div>
                            ${offer.descrizione ? `<div class="description">"${offer.descrizione}"</div>` : ''}
                        </div>
                        <div class="offer-card-footer">
                            <div class="spots-indicator">
                                <div class="spots-bar">
                                    <div class="spots-bar-fill ${barClass}" style="width: ${progress}%"></div>
                                </div>
                                ${offer.posti_disponibili}/${offer.posti_totali} posti
                            </div>
                            ${offer.is_own ? 
                                `<button class="btn btn-secondary btn-sm" disabled>Tua offerta</button>` : 
                                (offer.already_claimed ? 
                                    `<button class="btn btn-success btn-sm" disabled style="background:var(--success);color:white">Prenotato ✓</button>` :
                                    `<button class="btn btn-primary btn-sm" onclick="claimOffer(${offer.id})">Approfitta!</button>`
                                )
                            }
                        </div>
                    `;
                    panel.appendChild(card);

                    // Aggiungi marker su mappa
                    const marker = L.marker([offer.lat, offer.lon], { icon: createCustomIcon(offer.tipo_pasto) });
                    marker.bindPopup(`<b>${offer.nome_locale}</b><br>${offer.posti_disponibili} posti disponibili<br>${formatDateDisplay(offer.data_ora)}`);
                    marker.addTo(map);
                    markers.push(marker);
                });
                
            } catch (err) {
                console.error(err);
                document.getElementById('offers-panel').innerHTML = `
                    <div class="alert alert-error">⚠️ Si è verificato un errore nel caricamento delle offerte.</div>
                `;
            }
        }

        async function claimOffer(offerId) {
            try {
                const res = await fetch(`/api/offers/${offerId}/claim`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('Hai approfittato con successo!', 'success');
                    loadOffers(); // ricarica per aggiornare UI
                } else {
                    showToast(data.error || 'Impossibile approfittare.', 'error');
                }
            } catch (err) {
                showToast('Errore di connessione.', 'error');
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
