<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ApprofittOffro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">
            <div class="logo-icon">🍽️</div>
            ApprofittOffro
        </a>
        <div class="navbar-nav">
            <a href="/new-offer" class="btn btn-primary btn-sm">+ Offri</a>
            <a href="/profile">Profilo</a>
            <button onclick="logout()">Esci</button>
        </div>
    </nav>

    <main class="main-content container">
        <div class="dashboard-header" style="display: flex; flex-direction:column; gap: 16px; margin-bottom: 24px;">
            <h2>Esplora Offerte</h2>
            
            <div style="display:flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap:16px;">
                <div class="filter-bar">
                    <button class="filter-chip active" onclick="setFilter('')">Tutte</button>
                    <button class="filter-chip" onclick="setFilter('colazione')">Colazione</button>
                    <button class="filter-chip" onclick="setFilter('pranzo')">Pranzo</button>
                    <button class="filter-chip" onclick="setFilter('cena')">Cena</button>
                </div>
                
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-weight: 600; color:var(--text-muted); font-size:0.9rem;">Distanza Massima:</label>
                    <select id="radius-filter" class="form-control" style="width: auto; display:inline-block; padding: 6px 12px; min-height: 0;" onchange="setRadius(this.value)">
                        <option value="">Ovunque</option>
                        <option value="5">Entro 5 km</option>
                        <option value="10">Entro 10 km</option>
                        <option value="25">Entro 25 km</option>
                        <option value="50">Entro 50 km</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Map Container -->
            <div class="map-container" style="position: relative;">
                <button onclick="locateMeDashboard()" class="btn btn-sm btn-light" style="position: absolute; top: 15px; left: 55px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-weight:600; padding: 6px 12px; border-radius: 20px;">📍 Posizione Attuale</button>
                <div id="map"></div>
            </div>

            <!-- Offers Panel -->
            <div class="offers-panel" id="offers-panel">
                <!-- Verranno caricate tramite JS -->
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        let map;
        let markers = [];
        let currentFilter = '';
        let currentRadius = '';
        const defaultLat = {{ current_user.latitudine }};
        const defaultLon = {{ current_user.longitudine }};
        
        let searchMarker;
        let searchCircle;
        let searchLat = defaultLat;
        let searchLon = defaultLon;

        // Custom Leaflet Icons basate sul CSS
        const createCustomIcon = (type) => {
            let color = '#3B82F6';
            if (type === 'colazione') color = '#F59E0B'; // Amber
            if (type === 'pranzo') color = '#10B981'; // Emerald
            if (type === 'cena') color = '#8B5CF6'; // Violet
            
            return L.divIcon({
                className: 'custom-map-marker',
                html: `<div style="background-color: ${color}; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10],
                popupAnchor: [0, -10]
            });
        };

        function locateMeDashboard() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(pos => {
                    searchLat = pos.coords.latitude;
                    searchLon = pos.coords.longitude;
                    map.setView([searchLat, searchLon], 14);
                    searchMarker.setLatLng([searchLat, searchLon]);
                    updateRadar();
                    loadOffers();
                }, err => {
                    alert("GPS negato. Usa https:// invece di http://");
                }, { enableHighAccuracy: true });
            }
        }

        function initMap() {
            map = L.map('map').setView([defaultLat, defaultLon], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            // Aggiungi marker di ricerca centrale (draggable)
            const searchIcon = L.divIcon({
                className: 'custom-map-search-marker',
                html: `<div style="background-color: var(--primary); width: 24px; height: 24px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5);"></div>`,
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });
            searchMarker = L.marker([searchLat, searchLon], { icon: searchIcon, draggable: true, zIndexOffset: 1000 }).addTo(map);
            searchMarker.bindPopup("<b>📍 Punto di Ricerca</b><br>Trascina per spostare il raggio d'azione").openPopup();

            searchMarker.on('dragend', function() {
                const pos = searchMarker.getLatLng();
                searchLat = pos.lat;
                searchLon = pos.lng;
                
                // Centra la mappa dolcemente sul nuovo punto di ricerca
                map.panTo([searchLat, searchLon]);
                
                // Ricarica le offerte con le nuove coordinate
                loadOffers();
            });

            // Se il GPS funziona (in HTTPS), centra la mappa al primo caricamento automatico
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(pos => {
                    searchLat = pos.coords.latitude;
                    searchLon = pos.coords.longitude;
                    map.setView([searchLat, searchLon], 14);
                    searchMarker.setLatLng([searchLat, searchLon]);
                    updateRadar();
                    loadOffers();
                }, () => { loadOffers(); });
            } else {
                loadOffers();
            }
        }

        function setRadius(radius) {
            currentRadius = radius;
            loadOffers();
        }

        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-chip').forEach(el => {
                if (el.textContent.toLowerCase() === type || (type === '' && el.textContent === 'Tutte')) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
            loadOffers();
        }

        async function loadOffers() {
            try {
                const url = `/api/offers?tipo=${currentFilter}&radius=${currentRadius}&lat=${searchLat}&lon=${searchLon}`;
                const res = await fetch(url);
                const data = await res.json();
                
                const panel = document.getElementById('offers-panel');
                panel.innerHTML = '';
                
                // Clear markers
                markers.forEach(m => map.removeLayer(m));
                markers = [];
                
                // Aggiorna il Cerchio di Ricerca (Raggio)
                if (searchCircle) {
                    map.removeLayer(searchCircle);
                }
                if (currentRadius) {
                    searchCircle = L.circle([searchLat, searchLon], {
                        radius: currentRadius * 1000,
                        color: 'var(--primary)',
                        fillColor: 'var(--primary)',
                        fillOpacity: 0.08,
                        weight: 2,
                        dashArray: '5, 5'
                    }).addTo(map);
                }

                if (!data.success || data.offers.length === 0) {
                    const filterName = currentFilter ? `per ${currentFilter}` : "";
                    panel.innerHTML = `
                        <div style="text-align: center; padding: 60px 24px; color: var(--text-muted); background: var(--bg-card); border-radius: var(--radius-lg); border: 1px dashed var(--border);">
                            <div style="font-size: 3rem; margin-bottom: 16px;">🍽️</div>
                            <h3>Nessuna offerta</h3>
                            <p>Non ci sono offerte disponibili ${filterName} al momento.</p>
                            <a href="/new-offer" class="btn btn-primary mt-2">+ Offri tu per primo</a>
                        </div>
                    `;
                    return;
                }

                data.offers.forEach(offer => {
                    const isColazione = offer.tipo_pasto === 'colazione';
                    const isPranzo = offer.tipo_pasto === 'pranzo';
                    const iconEmoji = isColazione ? '☕' : (isPranzo ? '🍝' : '🌙');
                    
                    const progress = (offer.posti_disponibili / offer.posti_totali) * 100;
                    let barClass = '';
                    if (progress < 30) barClass = 'critical';
                    else if (progress < 60) barClass = 'low';

                    const card = document.createElement('div');
                    card.className = 'offer-card';
                    card.innerHTML = `
                        <div class="offer-card-header">
                            <img src="/uploads/${offer.autore_foto}" alt="${offer.autore}" class="avatar">
                            <div class="info">
                                <div class="name">${offer.autore}</div>
                                <div class="meta">${offer.autore_fascia_eta} anni</div>
                            </div>
                            <div class="offer-type-badge badge-${offer.tipo_pasto}">
                                ${iconEmoji} ${offer.tipo_pasto.charAt(0).toUpperCase() + offer.tipo_pasto.slice(1)}
                            </div>
                        </div>
                        <div class="offer-card-body">
                            <h4>${offer.nome_locale}</h4>
                            <div class="address" style="margin-bottom:8px;">📍 ${offer.indirizzo} <br><span style="color:var(--primary); font-weight:600; font-size:0.85rem;">(a ${offer.distance_km} km da te)</span></div>
                            <div class="datetime-info">🕒 ${formatDate(offer.data_ora)}</div>
                            ${offer.descrizione ? `<div class="description" style="margin-bottom:8px;">"${offer.descrizione}"</div>` : ''}
                            
                            <div style="display:flex; flex-direction:column; gap:4px; margin-top:12px;">
                                ${offer.autore_cibi_preferiti && offer.autore_cibi_preferiti.length > 2 ? `<div style="font-size:0.75rem; background:#F0FDF4; color:#065F46; padding:4px 8px; border-radius:6px; font-weight:500;">💚 Ama: ${offer.autore_cibi_preferiti}</div>` : ''}
                                ${offer.autore_intolleranze && offer.autore_intolleranze.toLowerCase() !== 'nessuna' ? `<div style="font-size:0.75rem; background:#FEF2F2; color:#991B1B; padding:4px 8px; border-radius:6px; font-weight:500;">⛔ Evita: ${offer.autore_intolleranze}</div>` : ''}
                            </div>
                        </div>
                        <div class="offer-card-footer">
                            <div class="spots-indicator">
                                <div class="spots-bar">
                                    <div class="spots-bar-fill ${barClass}" style="width: ${progress}%"></div>
                                </div>
                                ${offer.posti_disponibili}/${offer.posti_totali} posti
                            </div>
                            ${offer.is_own ? 
                                `<button class="btn btn-secondary btn-sm" disabled>Tua offerta</button>` : 
                                (offer.already_claimed ? 
                                    `<button class="btn btn-success btn-sm" disabled style="background:var(--success);color:white">Prenotato ✓</button>` :
                                    `<button class="btn btn-primary btn-sm" onclick="claimOffer(${offer.id})">Approfitta!</button>`
                                )
                            }
                        </div>
                    `;
                    panel.appendChild(card);

                    // Aggiungi marker su mappa
                    const marker = L.marker([offer.lat, offer.lon], { icon: createCustomIcon(offer.tipo_pasto) });
                    marker.bindPopup(`<b>${offer.nome_locale}</b><br>${offer.posti_disponibili} posti disponibili<br>${formatDate(offer.data_ora)}`);
                    marker.addTo(map);
                    markers.push(marker);
                });
                
            } catch (err) {
                console.error(err);
                document.getElementById('offers-panel').innerHTML = `
                    <div class="alert alert-error">⚠️ Si è verificato un errore nel caricamento delle offerte.</div>
                `;
            }
        }

        async function claimOffer(offerId) {
            try {
                const res = await fetch(`/api/offers/${offerId}/claim`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('Hai approfittato con successo!', 'success');
                    loadOffers(); // ricarica per aggiornare UI
                } else {
                    showToast(data.error || 'Impossibile approfittare.', 'error');
                }
            } catch (err) {
                showToast('Errore di connessione.', 'error');
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
