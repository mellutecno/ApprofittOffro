<div style="font-family:sans-serif; max-width:600px; margin:0 auto; background:#fffaf4; padding:32px; border-radius:16px; border:1px solid #fed7aa;">
    <h2 style="color:#9a3412;">Messaggio dall'amministrazione</h2>
    <p>Ciao <b>{{ user.nome }}</b>, hai ricevuto una comunicazione dallo staff di ApprofittOffro.</p>

    <div style="background:white; padding:20px; border-radius:12px; margin:16px 0; border-left:4px solid #f97316;">
        <b>Oggetto:</b> {{ subject_line }}<br><br>
        <b>Messaggio:</b><br>
        <div style="color:#6b7280; white-space:pre-line;">{{ message_body }}</div>
    </div>

    <p style="font-size:0.95rem; color:#4b5563;">Se devi chiarire qualcosa, puoi rispondere direttamente a questa email.</p>
    <p style="color:#9ca3af; font-size:0.8rem; margin-top:24px;">— {{ admin_user.nome }} • Team ApprofittOffro</p>
</div>
