name: approfittoffro_mobile
description: Frontend Flutter utenti per ApprofittOffro, con backend Python/Flask e admin web separato.
publish_to: "none"
version: 0.1.0+2007

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.16.0
  google_sign_in: ^7.2.0
  http: ^1.2.1
  image_cropper: ^12.1.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  app_links: ^6.4.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^17.2.2
  record: ^6.1.2
  just_audio: ^0.10.4
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  local_auth: ^2.3.0
  cloud_firestore: ^5.6.12
  file_picker: ^10.3.2
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

dependency_overrides:
  google_sign_in_android: 7.2.9

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_icon.png
    - assets/branding/wordmark.png
    - assets/landing/

flutter_launcher_icons:
  android: true
  image_path: "assets/branding/app_icon.png"
  adaptive_icon_foreground: "assets/branding/app_icon.png"
  adaptive_icon_background: "#F6EFE6"
  min_sdk_android: 34

flutter_native_splash:
  color: "#F6EFE6"
  image: assets/branding/app_icon.png
  android_12:
    color: "#F6EFE6"
    image: assets/branding/app_icon.png
