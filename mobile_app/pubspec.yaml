name: approfittoffro_mobile
description: Frontend Flutter utenti per ApprofittOffro, con backend Python/Flask e admin web separato.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  geolocator: ^14.0.2
  http: ^1.2.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  image_path: assets/branding/app_icon.png
  min_sdk_android: 21
